<ion-content [fullscreen]="true">
  <div class="page-container">

    <!-- ══ Header ═════════════════════════════════════════════ -->
    <header class="page-header" role="banner">
      <ion-button
        fill="clear"
        class="back-button"
        id="btn-back-to-dashboard"
        aria-label="Volver al repertorio de canciones"
        (click)="goBack()">
        <ion-icon slot="start" name="arrow-back-outline" aria-hidden="true"></ion-icon>
        Volver al Repertorio
      </ion-button>
    </header>

    <!-- ══ Grid Principal ════════════════════════════════════ -->
    <form class="content-grid" [formGroup]="songForm" (ngSubmit)="updateSong()" novalidate>

      <!-- COLUMNA IZQUIERDA: Secciones de la canción -->
      <main class="main-content" role="main">
        <div class="song-body">
          <ng-container *ngFor="let section of songSections; trackBy: trackByKey">
            <div
              class="section-card"
              [class.open]="section.open"
              *ngIf="isEditing || songForm.get(section.key)?.value">
              <!-- Header de sección -->
              <div
                class="section-header"
                (click)="toggleSection(section)"
                [attr.aria-expanded]="section.open"
                [attr.aria-controls]="'section-' + section.key"
                role="button"
                tabindex="0"
                (keydown.enter)="toggleSection(section)"
                (keydown.space)="toggleSection(section)">
                <span class="section-name">{{ section.title }}</span>
                <ion-icon
                  class="toggle-icon"
                  [name]="section.open ? 'chevron-up-outline' : 'chevron-down-outline'"
                  aria-hidden="true">
                </ion-icon>
              </div>

              <!-- Contenido de sección -->
              <div
                class="section-content"
                [id]="'section-' + section.key"
                *ngIf="section.open"
                role="region"
                [attr.aria-label]="'Contenido de ' + section.title">
                <!-- Vista -->
                <div *ngIf="!isEditing; else editSection" class="lyrics-content">
                  <div [innerHTML]="parseChords(songForm.get(section.key)?.value)"></div>
                </div>
                <!-- Edición -->
                <ng-template #editSection>
                  <ion-item class="editable-textarea" lines="none">
                    <ion-textarea
                      [autoGrow]="true"
                      [formControlName]="section.key"
                      [attr.aria-label]="'Editar ' + section.title"
                      placeholder="Escribe aquí...">
                    </ion-textarea>
                  </ion-item>
                </ng-template>
              </div>
            </div>
          </ng-container>
        </div>
      </main>

      <!-- COLUMNA DERECHA: Info + Acciones -->
      <aside class="sidebar-content" role="complementary" aria-label="Información y acciones de la canción">
        <div class="sidebar-sticky-content">

          <!-- Info Card -->
          <div class="info-card">
            <!-- Vista Normal -->
            <ng-container *ngIf="!isEditing">
              <h1 class="song-title">{{ songForm.get('name')?.value || 'Sin Título' }}</h1>
              <div class="label-row">
                <p class="label-title">Etiqueta</p>
                <span class="song-label">{{ songForm.get('label')?.value || 'General' }}</span>
              </div>
            </ng-container>

            <!-- Modo Edición -->
            <ng-container *ngIf="isEditing">
              <ion-item class="editable-field" lines="none">
                <ion-label position="stacked" aria-hidden="true">Título</ion-label>
                <ion-input
                  type="text"
                  formControlName="name"
                  aria-label="Título de la canción"
                  placeholder="Título de la canción">
                </ion-input>
              </ion-item>
              <ion-item class="editable-field" lines="none">
                <ion-label position="stacked" aria-hidden="true">Etiqueta</ion-label>
                <ion-input
                  type="text"
                  formControlName="label"
                  aria-label="Etiqueta de la canción"
                  placeholder="Ej: Adoración, Alabanza...">
                </ion-input>
              </ion-item>
            </ng-container>
          </div>

          <!-- Actions Card -->
          <div class="actions-card">
            <h2 class="actions-title">Acciones</h2>
            <div *ngIf="!isEditing; else editingActions">
              <ion-button
                expand="block"
                class="edit-btn"
                id="btn-edit-song"
                aria-label="Editar canción"
                (click)="startEditing()">
                <ion-icon slot="start" name="create-outline" aria-hidden="true"></ion-icon>
                Editar Canción
              </ion-button>
            </div>
            <ng-template #editingActions>
              <ion-button
                expand="block"
                color="primary"
                class="save-btn"
                id="btn-save-song"
                aria-label="Guardar cambios en la canción"
                (click)="updateSong()">
                <ion-icon slot="start" name="save-outline" aria-hidden="true"></ion-icon>
                Guardar Cambios
              </ion-button>
              <ion-button
                expand="block"
                fill="outline"
                color="medium"
                id="btn-cancel-edit"
                aria-label="Cancelar edición"
                (click)="cancelEditing()">
                Cancelar
              </ion-button>
            </ng-template>
          </div>

        </div>
      </aside>
    </form>
  </div>
</ion-content>
